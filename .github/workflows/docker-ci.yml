name: Lab 2 CI Pipeline

on:
  push:
    branches: [ "lab2-docker" ]

env:
  REGISTRY: ghcr.io
  # github.repository автоматично підставить <username>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Джоба 1: Збірка і пуш у GitHub Container Registry
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Дозвіл на запис образів

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Переводимо ім'я репозиторію в нижній регістр (вимога Docker)
      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

  # Джоба 2: Пул образу і запуск тестів
  test:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Pull Docker image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

      - name: Run tests inside container
        # Запускаємо контейнер, але замість python app.py виконуємо pytest
        run: docker run ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest pytest test_app.py
