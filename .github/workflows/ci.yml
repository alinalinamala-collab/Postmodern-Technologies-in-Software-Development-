name: Docker CI Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Дозвіл на пуш в GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Перетворюємо ім'я репозиторію на нижній регістр (вимога Docker)
      - name: Set lower case repository name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  test:
    needs: build-and-push # Ця джоба чекає завершення попередньої
    runs-on: ubuntu-latest
    permissions:
      packages: read # Дозвіл на пул з GHCR

    steps:
      - name: Set lower case repository name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image and run tests
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Додаємо слово pytest в кінець команди. 
          # Це ігнорує CMD ["python", "app.py"] і запускає тести всередині контейнера.
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest pytest
