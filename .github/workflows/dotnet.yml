name: .NET CI

on:
  push:
    branches: [ "lab3-CLI" ]
  pull_request:
    branches: [ "lab3-CLI" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore MyWcProject/MyWc.sln
      
    - name: Build
      run: dotnet build MyWcProject/MyWc.sln --no-restore
      
    - name: Test
      run: dotnet test MyWcProject/MyWc.sln --no-build --verbosity normal
